name: Lint

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  lint:
    name: Validate Worker
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate wrangler.toml and bundle the worker
        run: bunx wrangler deploy --dry-run --env production --outdir /tmp/dry-run
        env:
          CLOUDFLARE_API_TOKEN: dry-run
          CLOUDFLARE_ACCOUNT_ID: dry-run
